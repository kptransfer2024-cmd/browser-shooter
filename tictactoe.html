<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      color: #a8dadc;
      min-height: 1.5em;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px rgba(168, 218, 220, 0.5);
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
    }

    .score-box span {
      display: block;
      font-size: 1.6rem;
      font-weight: bold;
    }

    .score-box.x-score span { color: #e94560; }
    .score-box.o-score span { color: #a8dadc; }
    .score-box.draw-score span { color: #f0c27f; }

    #reset {
      margin-top: 1.5rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #reset:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>
  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>
  <div id="score">
    <div class="score-box x-score">X <span id="xScore">0</span></div>
    <div class="score-box draw-score">Draws <span id="drawScore">0</span></div>
    <div class="score-box o-score">O <span id="oScore">0</span></div>
  </div>
  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;
    let scores = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const reset = document.getElementById('reset');

    function init() {
      board = Array(9).fill('');
      current = 'X';
      over = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = "Player X's turn";
    }

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[b] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add('taken', current.toLowerCase());

        const win = checkWin();
        if (win) {
          over = true;
          win.forEach(idx => cells[idx].classList.add('win'));
          status.textContent = `Player ${current} wins!`;
          scores[current]++;
          updateScores();
        } else if (board.every(v => v)) {
          over = true;
          status.textContent = "It's a draw!";
          scores.D++;
          updateScores();
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `Player ${current}'s turn`;
        }
      });
    });

    function updateScores() {
      document.getElementById('xScore').textContent = scores.X;
      document.getElementById('oScore').textContent = scores.O;
      document.getElementById('drawScore').textContent = scores.D;
    }

    reset.addEventListener('click', init);
    init();
  </script>
</body>
</html>
