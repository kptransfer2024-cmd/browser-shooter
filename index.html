<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Assault</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; cursor: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ================================================================
// === CONSTANTS + UTILS ==========================================
// ================================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const STATE = { MENU: 0, PLAYING: 1, LEVEL_COMPLETE: 2, GAME_OVER: 3 };
let gameState = STATE.MENU;

let score = 0;
let hiScore = 0;
let levelKills = 0;
let levelScore = 0;
let currentLevelIndex = 0;
let timestamp = 0;

function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function rnd(lo, hi) { return lo + Math.random() * (hi - lo); }
function rndInt(lo, hi) { return Math.floor(rnd(lo, hi + 1)); }
function rndAngle() { return Math.random() * Math.PI * 2; }
function circleOverlap(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y, r = a.radius + b.radius;
  return dx * dx + dy * dy < r * r;
}

// ================================================================
// === INPUT ======================================================
// ================================================================

const input = {
  keys: {},
  mouse: { x: W / 2, y: H / 2, down: false },
  clicks: []
};

window.addEventListener('keydown', e => {
  input.keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (e.key === 'Enter') input.clicks.push({ x: -1, y: -1, enter: true });
});
window.addEventListener('keyup', e => { input.keys[e.key] = false; });
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  input.mouse.x = e.clientX - r.left;
  input.mouse.y = e.clientY - r.top;
});
canvas.addEventListener('mousedown', e => {
  input.mouse.down = true;
  const r = canvas.getBoundingClientRect();
  input.clicks.push({ x: e.clientX - r.left, y: e.clientY - r.top });
});
canvas.addEventListener('mouseup', () => { input.mouse.down = false; });

function clickedRect(x, y, w, h) {
  return input.clicks.some(c => c.enter || (c.x >= x && c.x <= x + w && c.y >= y && c.y <= y + h));
}

// ================================================================
// === PARTICLES ==================================================
// ================================================================

let particles = [];

function createMuzzleFlash(x, y, angle) {
  const ps = [];
  for (let i = 0; i < 8; i++) {
    const spread = rnd(-0.45, 0.45);
    const a = angle + spread;
    const spd = rnd(180, 380);
    ps.push({
      type: 'line', x, y,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      life: rnd(0.05, 0.1), maxLife: 0.1,
      color: ['#ffffff','#ffff00','#ff8800'][rndInt(0,2)],
      gravity: 0, alpha: 1
    });
  }
  ps.push({
    type: 'circle', x, y, vx: 0, vy: 0,
    radius: 10, life: 0.07, maxLife: 0.07,
    color: '#ff6600', alpha: 0.7, gravity: 0
  });
  return ps;
}

function createHitSpark(x, y) {
  const ps = [];
  for (let i = 0; i < 6; i++) {
    const a = rndAngle();
    const spd = rnd(80, 220);
    ps.push({
      type: 'rect', x, y,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      size: 3, life: rnd(0.15, 0.3), maxLife: 0.3,
      color: '#ff4444', alpha: 1, gravity: 200
    });
  }
  return ps;
}

function createDeathBurst(ex, ey, type) {
  const ps = [];
  const configs = {
    grunt:   { color: '#cc2222', size: 4, count: 14, spd: [120,280], grav: 80,  life: [0.5,0.8] },
    brute:   { color: '#8B4513', size: 6, count: 16, spd: [60,160],  grav: 150, life: [0.7,1.1] },
    speeder: { color: '#9932CC', size: 2, count: 18, spd: [180,380], grav: 30,  life: [0.25,0.5] }
  };
  const cfg = configs[type] || configs.grunt;
  for (let i = 0; i < cfg.count; i++) {
    const a = (i / cfg.count) * Math.PI * 2 + rnd(-0.3, 0.3);
    const spd = rnd(cfg.spd[0], cfg.spd[1]);
    ps.push({
      type: 'rect', x: ex, y: ey,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      size: cfg.size + rnd(-1, 1),
      life: rnd(cfg.life[0], cfg.life[1]),
      maxLife: cfg.life[1],
      color: cfg.color, alpha: 1, gravity: cfg.grav
    });
  }
  // Expanding ring
  ps.push({
    type: 'ring', x: ex, y: ey, vx: 0, vy: 0,
    radius: 8, maxRadius: 40,
    life: 0.35, maxLife: 0.35,
    color: cfg.color, alpha: 0.8, gravity: 0
  });
  return ps;
}

function updateParticles(dt) {
  for (const p of particles) {
    p.life -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += p.gravity * dt;
    p.alpha = Math.max(0, p.life / p.maxLife);
  }
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    if (p.type === 'rect') {
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    } else if (p.type === 'circle') {
      const r = p.radius * p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.1, r), 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'line') {
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2 * p.alpha;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + p.vx * 0.04, p.y + p.vy * 0.04);
      ctx.stroke();
    } else if (p.type === 'ring') {
      const t = 1 - p.life / p.maxLife;
      const r = p.radius + (p.maxRadius - p.radius) * t;
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ================================================================
// === BULLETS ====================================================
// ================================================================

let bullets = [];

class Bullet {
  constructor(x, y, angle) {
    this.x = x; this.y = y;
    const spd = 620;
    this.vx = Math.cos(angle) * spd;
    this.vy = Math.sin(angle) * spd;
    this.radius = 4;
    this.alive = true;
    this.trail = [];
    this.damage = 1;
  }
  update(dt) {
    this.trail.unshift({ x: this.x, y: this.y });
    if (this.trail.length > 5) this.trail.pop();
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    if (this.x < -20 || this.x > W + 20 || this.y < -20 || this.y > H + 20) this.alive = false;
  }
  draw() {
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      ctx.globalAlpha = (0.5 - i * 0.1);
      ctx.fillStyle = '#ffdd44';
      ctx.beginPath();
      ctx.arc(t.x, t.y, Math.max(0.5, 3 - i * 0.5), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#ffee00';
    ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2); ctx.fill();
  }
}

// ================================================================
// === PLAYER =====================================================
// ================================================================

class Player {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.speed = 185;
    this.angle = 0;
    this.health = 100;
    this.maxHealth = 100;
    this.radius = 13;
    this.shootCooldown = 0;
    this.shootRate = 0.16;
    this.walkFrame = 0;
    this.walkTimer = 0;
    this.isMoving = false;
    this.invincibleTimer = 0;
  }
  update(dt) {
    let dx = 0, dy = 0;
    if (input.keys['ArrowLeft']  || input.keys['a'] || input.keys['A']) dx -= 1;
    if (input.keys['ArrowRight'] || input.keys['d'] || input.keys['D']) dx += 1;
    if (input.keys['ArrowUp']    || input.keys['w'] || input.keys['W']) dy -= 1;
    if (input.keys['ArrowDown']  || input.keys['s'] || input.keys['S']) dy += 1;
    const len = Math.hypot(dx, dy);
    if (len > 0) { dx /= len; dy /= len; }
    this.isMoving = len > 0;
    this.x = clamp(this.x + dx * this.speed * dt, this.radius, W - this.radius);
    this.y = clamp(this.y + dy * this.speed * dt, this.radius, H - this.radius);
    this.angle = Math.atan2(input.mouse.y - this.y, input.mouse.x - this.x);
    if (this.isMoving) {
      this.walkTimer += dt;
      if (this.walkTimer > 0.11) { this.walkTimer = 0; this.walkFrame = (this.walkFrame + 1) % 4; }
    }
    this.shootCooldown -= dt;
    if (input.mouse.down && this.shootCooldown <= 0) {
      const bx = this.x + Math.cos(this.angle) * 22;
      const by = this.y + Math.sin(this.angle) * 22;
      bullets.push(new Bullet(bx, by, this.angle));
      particles.push(...createMuzzleFlash(bx, by, this.angle));
      this.shootCooldown = this.shootRate;
    }
    if (this.invincibleTimer > 0) this.invincibleTimer -= dt;
  }
  takeDamage(amt) {
    if (this.invincibleTimer > 0) return;
    this.health -= amt;
    this.invincibleTimer = 1.2;
    if (this.health < 0) this.health = 0;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    if (this.invincibleTimer > 0) {
      ctx.globalAlpha = 0.4 + 0.6 * Math.abs(Math.sin(this.invincibleTimer * 18));
    }
    const legBob = this.isMoving ? Math.sin(this.walkFrame * Math.PI / 2) * 4 : 0;

    // Legs
    ctx.fillStyle = '#2e4e8a';
    ctx.fillRect(-10, 8, 8, 12 + legBob);
    ctx.fillRect(2,   8, 8, 12 - legBob);
    // Boots
    ctx.fillStyle = '#1a2e55';
    ctx.fillRect(-10, 18 + legBob, 8, 4);
    ctx.fillRect(2,   18 - legBob, 8, 4);

    // Body
    ctx.fillStyle = '#4a9e4a';
    ctx.strokeStyle = '#2d6e2d';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(-11, -10, 22, 20, 4);
    ctx.fill(); ctx.stroke();

    // Head
    ctx.fillStyle = '#f0c070';
    ctx.beginPath(); ctx.arc(0, -14, 8, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#c8984a'; ctx.lineWidth = 1;
    ctx.stroke();
    // Eyes
    ctx.fillStyle = '#2a1a0a';
    ctx.fillRect(-4, -17, 3, 3);
    ctx.fillRect(1,  -17, 3, 3);

    // Gun arm (drawn rotated — already in player-local space)
    ctx.rotate(this.angle);
    ctx.fillStyle = '#777';
    ctx.fillRect(6, -3, 16, 5);
    ctx.fillStyle = '#555';
    ctx.fillRect(20, -2.5, 7, 4);
    ctx.fillStyle = '#333';
    ctx.fillRect(8, -5, 6, 3);

    ctx.restore();
  }
}

// ================================================================
// === ENEMIES ====================================================
// ================================================================

const ENEMY_CONFIGS = {
  grunt: {
    type: 'grunt', speed: 82, health: 2, radius: 13,
    scoreValue: 10, color: '#c03030'
  },
  brute: {
    type: 'brute', speed: 52, health: 6, radius: 18,
    scoreValue: 30, color: '#8B4513'
  },
  speeder: {
    type: 'speeder', speed: 162, health: 1, radius: 9,
    scoreValue: 20, color: '#9932CC'
  }
};

class Enemy {
  constructor(x, y, cfg) {
    this.x = x; this.y = y;
    this.speed = cfg.speed;
    this.health = cfg.health;
    this.maxHealth = cfg.health;
    this.radius = cfg.radius;
    this.scoreValue = cfg.scoreValue;
    this.color = cfg.color;
    this.type = cfg.type;
    this.dead = false;
    this.walkFrame = 0;
    this.walkTimer = 0;
    this.hitFlash = 0;
    this.posHistory = [];
    this.angle = 0;
  }
  update(dt, player) {
    const dx = player.x - this.x;
    const dy = player.y - this.y;
    const len = Math.hypot(dx, dy) || 1;
    this.angle = Math.atan2(dy, dx);
    this.x += (dx / len) * this.speed * dt;
    this.y += (dy / len) * this.speed * dt;
    this.walkTimer += dt;
    if (this.walkTimer > 0.13) { this.walkTimer = 0; this.walkFrame = (this.walkFrame + 1) % 4; }
    if (this.hitFlash > 0) this.hitFlash -= dt;
    if (this.type === 'speeder') {
      this.posHistory.unshift({ x: this.x, y: this.y });
      if (this.posHistory.length > 6) this.posHistory.pop();
    }
  }
  hit(dmg) {
    this.health -= dmg;
    this.hitFlash = 0.12;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    if (this.hitFlash > 0) { ctx.globalAlpha = 0.5; }

    if (this.type === 'grunt') this.drawGrunt();
    else if (this.type === 'brute') this.drawBrute();
    else if (this.type === 'speeder') this.drawSpeeder();

    ctx.restore();
  }
  drawGrunt() {
    const bob = Math.sin(this.walkFrame * Math.PI / 2) * 3;
    // Legs
    ctx.fillStyle = '#7a1010';
    ctx.fillRect(-7, 8, 6, 10 + bob);
    ctx.fillRect(1,  8, 6, 10 - bob);
    // Body
    ctx.fillStyle = this.color;
    ctx.strokeStyle = '#800000'; ctx.lineWidth = 1.5;
    ctx.fillRect(-11, -10, 22, 20);
    ctx.strokeRect(-11, -10, 22, 20);
    // Head
    ctx.fillStyle = '#c03030';
    ctx.fillRect(-8, -22, 16, 14);
    ctx.strokeRect(-8, -22, 16, 14);
    // Eyes (angry)
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-6, -20, 4, 4);
    ctx.fillRect(2,  -20, 4, 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(-5, -19, 2, 2);
    ctx.fillRect(3,  -19, 2, 2);
    // Angry brows
    ctx.strokeStyle = '#330000'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-6, -22); ctx.lineTo(-2, -20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(6,  -22); ctx.lineTo(2,  -20); ctx.stroke();
  }
  drawBrute() {
    // No legs — tank slides
    // Body (wide)
    ctx.fillStyle = this.color;
    ctx.strokeStyle = '#5a2d0c'; ctx.lineWidth = 2;
    ctx.fillRect(-16, -12, 32, 24);
    ctx.strokeRect(-16, -12, 32, 24);
    // Head (merged with body feel)
    ctx.fillStyle = '#9b5523';
    ctx.fillRect(-12, -24, 24, 14);
    ctx.strokeRect(-12, -24, 24, 14);
    // Angry brows
    ctx.strokeStyle = '#2a0f00'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-10, -24); ctx.lineTo(-3, -20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10,  -24); ctx.lineTo(3,  -20); ctx.stroke();
    // Eyes
    ctx.fillStyle = '#ff2200';
    ctx.fillRect(-8, -21, 5, 5);
    ctx.fillRect(3,  -21, 5, 5);
    // Arms (wide stubs)
    ctx.fillStyle = '#7a3a0f';
    ctx.fillRect(-26, -8, 12, 10);
    ctx.fillRect(14,  -8, 12, 10);
    // Health bar
    const bw = 36, bh = 5;
    const bx = -bw / 2, by = -32;
    ctx.fillStyle = '#300';
    ctx.fillRect(bx - 1, by - 1, bw + 2, bh + 2);
    ctx.fillStyle = '#cc0000';
    ctx.fillRect(bx, by, bw * (this.health / this.maxHealth), bh);
  }
  drawSpeeder() {
    // Trail
    ctx.restore();
    ctx.save();
    for (let i = 0; i < this.posHistory.length; i++) {
      const p = this.posHistory[i];
      ctx.globalAlpha = (0.35 - i * 0.06);
      ctx.fillStyle = '#9932CC';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4 - i * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    // Slim body
    ctx.fillStyle = '#9932CC';
    ctx.strokeStyle = '#6600aa'; ctx.lineWidth = 1;
    ctx.fillRect(-5, -12, 10, 22);
    ctx.strokeRect(-5, -12, 10, 22);
    // Slash marks
    ctx.strokeStyle = '#cc55ff'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-4, -4); ctx.lineTo(4, 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-4, 2);  ctx.lineTo(4, 8); ctx.stroke();
    // Head
    ctx.fillStyle = '#bb44ee';
    ctx.beginPath(); ctx.arc(0, -14, 6, 0, Math.PI * 2); ctx.fill();
    // Eyes
    ctx.fillStyle = '#ffaaff';
    ctx.fillRect(-3, -17, 2, 3);
    ctx.fillRect(1,  -17, 2, 3);
  }
}

function spawnEnemy(type, lvlMultiplier) {
  const cfg = { ...ENEMY_CONFIGS[type] };
  cfg.speed  = cfg.speed  * (1 + (lvlMultiplier - 1) * 0.15);
  cfg.health = Math.ceil(cfg.health * (1 + (lvlMultiplier - 1) * 0.1));
  const edge = rndInt(0, 3);
  let x, y;
  if      (edge === 0) { x = rnd(0, W); y = -30; }
  else if (edge === 1) { x = W + 30;    y = rnd(0, H); }
  else if (edge === 2) { x = rnd(0, W); y = H + 30; }
  else                 { x = -30;       y = rnd(0, H); }
  return new Enemy(x, y, cfg);
}

// ================================================================
// === LEVEL CONFIG ===============================================
// ================================================================

const LEVEL_CONFIGS = [
  {
    levelNum: 1,
    waves: [
      { enemies: [{ type: 'grunt', count: 5  }], spawnDelay: 0.9 },
      { enemies: [{ type: 'grunt', count: 8  }], spawnDelay: 0.75 },
      { enemies: [{ type: 'grunt', count: 11 }], spawnDelay: 0.6 }
    ]
  },
  {
    levelNum: 2,
    waves: [
      { enemies: [{ type: 'grunt', count: 8 }, { type: 'brute', count: 2 }], spawnDelay: 0.65 },
      { enemies: [{ type: 'grunt', count: 10}, { type: 'brute', count: 3 }], spawnDelay: 0.55 },
      { enemies: [{ type: 'brute', count: 6 }],                              spawnDelay: 0.8  }
    ]
  },
  {
    levelNum: 3,
    waves: [
      { enemies: [{ type: 'speeder', count: 8  }, { type: 'grunt',   count: 6 }], spawnDelay: 0.5  },
      { enemies: [{ type: 'speeder', count: 12 }, { type: 'brute',   count: 4 }], spawnDelay: 0.4  },
      { enemies: [{ type: 'speeder', count: 10 }, { type: 'brute',   count: 5 }, { type: 'grunt', count: 8 }], spawnDelay: 0.35 }
    ]
  }
];

function getLevelConfig(idx) {
  if (idx < LEVEL_CONFIGS.length) return LEVEL_CONFIGS[idx];
  const mult = idx - LEVEL_CONFIGS.length + 2;
  const base = LEVEL_CONFIGS[LEVEL_CONFIGS.length - 1];
  return {
    levelNum: idx + 1,
    waves: base.waves.map(w => ({
      spawnDelay: Math.max(0.15, w.spawnDelay - (mult - 1) * 0.05),
      enemies: w.enemies.map(e => ({
        type: e.type,
        count: Math.ceil(e.count * (1 + (mult - 1) * 0.3))
      }))
    }))
  };
}

// ================================================================
// === WAVE MANAGER ===============================================
// ================================================================

let enemies = [];

const waveManager = {
  levelCfg: null,
  currentWave: 0,
  spawnQueue: [],
  spawnTimer: 0,
  waveDelay: 0,
  active: false,
  levelDone: false,
  waveClearTimer: 0,

  startLevel(idx) {
    this.levelCfg = getLevelConfig(idx);
    this.currentWave = 0;
    this.levelDone = false;
    this.active = true;
    this.loadWave(0);
  },

  loadWave(wIdx) {
    const waveCfg = this.levelCfg.waves[wIdx];
    this.spawnQueue = [];
    this.waveDelay = waveCfg.spawnDelay;
    for (const e of waveCfg.enemies) {
      for (let i = 0; i < e.count; i++) this.spawnQueue.push(e.type);
    }
    // Shuffle spawn queue for variety
    for (let i = this.spawnQueue.length - 1; i > 0; i--) {
      const j = rndInt(0, i);
      [this.spawnQueue[i], this.spawnQueue[j]] = [this.spawnQueue[j], this.spawnQueue[i]];
    }
    this.spawnTimer = 0.5;
  },

  update(dt) {
    if (!this.active) return;
    if (this.waveClearTimer > 0) { this.waveClearTimer -= dt; return; }

    this.spawnTimer -= dt;
    if (this.spawnTimer <= 0 && this.spawnQueue.length > 0) {
      const type = this.spawnQueue.shift();
      enemies.push(spawnEnemy(type, currentLevelIndex + 1));
      this.spawnTimer = this.waveDelay;
    }

    if (this.spawnQueue.length === 0 && enemies.length === 0) {
      const nextWave = this.currentWave + 1;
      if (nextWave < this.levelCfg.waves.length) {
        this.currentWave = nextWave;
        this.waveClearTimer = 1.8;
        waveClearAnim = 1.8;
        this.loadWave(nextWave);
      } else {
        this.active = false;
        this.levelDone = true;
      }
    }
  },

  get totalWaves() { return this.levelCfg ? this.levelCfg.waves.length : 1; }
};

let waveClearAnim = 0;

// ================================================================
// === HUD ========================================================
// ================================================================

function drawBackground() {
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  const gs = 32;
  for (let x = 0; x < W; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawHUD(player) {
  // Health bar
  const bx = 20, by = 20, bw = 200, bh = 14;
  ctx.fillStyle = '#111';
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeRect(bx, by, bw, bh);
  const hpRatio = player.health / player.maxHealth;
  const hpColor = hpRatio > 0.5 ? '#22cc44' : hpRatio > 0.25 ? '#ddaa00' : '#cc2222';
  ctx.fillStyle = hpColor;
  ctx.fillRect(bx, by, bw * hpRatio, bh);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HP', bx + 4, by + 11);

  // Score
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#fff';
  ctx.fillText('SCORE: ' + String(score).padStart(6, '0'), W - 20, 36);

  // Level / wave
  ctx.font = '14px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText(`LVL ${currentLevelIndex + 1}  WAVE ${waveManager.currentWave + 1}/${waveManager.totalWaves}`, W - 20, 56);

  // Wave clear flash
  if (waveClearAnim > 0) {
    waveClearAnim -= 0.016;
    const scale = 1 + (waveClearAnim / 1.8) * 0.5;
    const alpha = Math.min(1, waveClearAnim);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${Math.floor(36 * scale)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#00ff88';
    ctx.fillText('WAVE CLEAR!', W / 2, H / 2 - 20);
    ctx.restore();
  }

  // Crosshair
  const mx = input.mouse.x, my = input.mouse.y;
  const pulse = Math.sin(timestamp * 8) * 1;
  const cLen = 8 + pulse, cGap = 4;
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(mx - cGap - cLen, my); ctx.lineTo(mx - cGap, my);
  ctx.moveTo(mx + cGap, my);       ctx.lineTo(mx + cGap + cLen, my);
  ctx.moveTo(mx, my - cGap - cLen); ctx.lineTo(mx, my - cGap);
  ctx.moveTo(mx, my + cGap);       ctx.lineTo(mx, my + cGap + cLen);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fillRect(mx - 1, my - 1, 2, 2);
}

// ================================================================
// === UI SCREENS =================================================
// ================================================================

function drawMenu() {
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#0f0f22';
  ctx.lineWidth = 1;
  const gs = 48;
  for (let x = 0; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  const cy = H / 2;
  const bob = Math.sin(timestamp * 1.5) * 5;

  // Title shadow
  ctx.font = 'bold 64px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#004422';
  ctx.fillText('PIXEL ASSAULT', W / 2 + 3, cy - 80 + bob + 3);
  // Title
  ctx.fillStyle = '#00ff88';
  ctx.fillText('PIXEL ASSAULT', W / 2, cy - 80 + bob);

  ctx.font = '14px monospace';
  ctx.fillStyle = '#446644';
  ctx.fillText('v1.0  —  retro top-down shooter', W / 2, cy - 44 + bob);

  // Play button
  const bw = 240, bh = 54, bx = W / 2 - bw / 2, by = cy - 10;
  ctx.fillStyle = '#0a2a0a';
  ctx.strokeStyle = '#00ff44';
  ctx.lineWidth = 2;
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeRect(bx, by, bw, bh);
  ctx.font = 'bold 20px monospace';
  ctx.fillStyle = '#00ff44';
  ctx.fillText('[ PRESS ENTER ]', W / 2, by + 33);

  // Controls hint
  ctx.font = '13px monospace';
  ctx.fillStyle = '#445544';
  ctx.fillText('WASD / ARROWS — move    MOUSE — aim & shoot', W / 2, cy + 70);

  // Hi-score
  ctx.font = '16px monospace';
  ctx.fillStyle = '#ffdd00';
  ctx.fillText('HI-SCORE: ' + String(hiScore).padStart(6, '0'), W / 2, cy + 100);
}

function drawLevelComplete(player) {
  // Dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, H);

  const bw = 420, bh = 280, bx = W / 2 - bw / 2, by = H / 2 - bh / 2;
  ctx.fillStyle = '#061506';
  ctx.strokeStyle = '#00ff44';
  ctx.lineWidth = 2;
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeRect(bx, by, bw, bh);

  ctx.textAlign = 'center';
  ctx.font = 'bold 28px monospace';
  ctx.fillStyle = '#00ff44';
  ctx.fillText(`LEVEL ${currentLevelIndex + 1} COMPLETE`, W / 2, by + 50);

  ctx.font = '18px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText(`SCORE: ${String(score).padStart(6, '0')}`, W / 2, by + 100);
  ctx.fillText(`KILLS THIS LEVEL: ${levelKills}`, W / 2, by + 128);

  ctx.font = '14px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText(`HEALTH REMAINING: ${player.health}`, W / 2, by + 158);

  // Continue button
  const cbw = 200, cbh = 46, cbx = W / 2 - cbw / 2, cby = by + 200;
  ctx.fillStyle = '#0a2a0a';
  ctx.strokeStyle = '#00ff44';
  ctx.lineWidth = 2;
  ctx.fillRect(cbx, cby, cbw, cbh);
  ctx.strokeRect(cbx, cby, cbw, cbh);
  ctx.font = 'bold 18px monospace';
  ctx.fillStyle = '#00ff44';
  ctx.fillText('[ CONTINUE ]', W / 2, cby + 29);

  if (clickedRect(cbx, cby, cbw, cbh)) startNextLevel();
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.82)';
  ctx.fillRect(0, 0, W, H);

  const bw = 420, bh = 260, bx = W / 2 - bw / 2, by = H / 2 - bh / 2;
  ctx.fillStyle = '#150505';
  ctx.strokeStyle = '#ff2222';
  ctx.lineWidth = 2;
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeRect(bx, by, bw, bh);

  ctx.textAlign = 'center';
  ctx.font = 'bold 44px monospace';
  ctx.fillStyle = '#ff2222';
  ctx.fillText('GAME OVER', W / 2, by + 66);

  ctx.font = '22px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText('SCORE: ' + String(score).padStart(6, '0'), W / 2, by + 116);

  ctx.font = '16px monospace';
  ctx.fillStyle = '#ffdd00';
  ctx.fillText('HI-SCORE: ' + String(hiScore).padStart(6, '0'), W / 2, by + 148);

  // Restart button
  const rbw = 200, rbh = 46, rbx = W / 2 - rbw / 2, rby = by + 186;
  ctx.fillStyle = '#2a0505';
  ctx.strokeStyle = '#ff4444';
  ctx.lineWidth = 2;
  ctx.fillRect(rbx, rby, rbw, rbh);
  ctx.strokeRect(rbx, rby, rbw, rbh);
  ctx.font = 'bold 18px monospace';
  ctx.fillStyle = '#ff4444';
  ctx.fillText('[ RESTART ]', W / 2, rby + 29);

  if (clickedRect(rbx, rby, rbw, rbh)) resetToMenu();
}

// ================================================================
// === GAME STATE =================================================
// ================================================================

let player;

function startGame() {
  score = 0;
  levelKills = 0;
  levelScore = 0;
  currentLevelIndex = 0;
  bullets = [];
  enemies = [];
  particles = [];
  waveClearAnim = 0;
  player = new Player(W / 2, H / 2);
  waveManager.startLevel(currentLevelIndex);
  gameState = STATE.PLAYING;
}

function startNextLevel() {
  currentLevelIndex++;
  levelKills = 0;
  levelScore = 0;
  bullets = [];
  enemies = [];
  particles = [];
  waveClearAnim = 0;
  player.health = Math.min(player.maxHealth, player.health + 30);
  waveManager.startLevel(currentLevelIndex);
  gameState = STATE.PLAYING;
}

function resetToMenu() {
  gameState = STATE.MENU;
}

function updateGame(dt) {
  player.update(dt);

  // Bullet vs enemy collision
  for (const b of bullets) {
    if (!b.alive) continue;
    for (const e of enemies) {
      if (!e.dead && circleOverlap(b, e)) {
        b.alive = false;
        e.hit(b.damage);
        particles.push(...createHitSpark(b.x, b.y));
        if (e.health <= 0) {
          e.dead = true;
          particles.push(...createDeathBurst(e.x, e.y, e.type));
          score += e.scoreValue;
          levelKills++;
          if (score > hiScore) hiScore = score;
        }
        break;
      }
    }
  }

  // Enemy vs player collision
  for (const e of enemies) {
    if (!e.dead && circleOverlap(e, player)) {
      player.takeDamage(18);
    }
  }

  bullets = bullets.filter(b => b.alive);
  enemies = enemies.filter(e => !e.dead);

  for (const b of bullets) b.update(dt);
  for (const e of enemies) e.update(dt, player);
  updateParticles(dt);
  waveManager.update(dt);

  if (player.health <= 0) gameState = STATE.GAME_OVER;
  if (waveManager.levelDone) {
    levelScore = score;
    gameState = STATE.LEVEL_COMPLETE;
  }
}

function drawGame() {
  for (const b of bullets) b.draw();
  for (const e of enemies) e.draw();
  drawParticles();
  player.draw();
}

// ================================================================
// === MAIN LOOP ==================================================
// ================================================================

let lastTime = 0;

function gameLoop(ts) {
  timestamp = ts / 1000;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  drawBackground();

  switch (gameState) {
    case STATE.MENU:
      drawMenu();
      if (clickedRect(W/2 - 120, H/2 - 10, 240, 54)) startGame();
      break;
    case STATE.PLAYING:
      updateGame(dt);
      drawGame();
      drawHUD(player);
      break;
    case STATE.LEVEL_COMPLETE:
      drawGame();
      drawHUD(player);
      drawLevelComplete(player);
      break;
    case STATE.GAME_OVER:
      drawGame();
      drawHUD(player);
      drawGameOver();
      break;
  }

  input.clicks = [];
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
